# Default to Software Decoding to prevent crashes on startup
hwdec=no
geometry=50%:50%
autofit-larger=60%x60%
autofit-smaller=60%x60%
keep-open=yes
pause=yes
volume=50
drag-and-drop=append
input-ipc-server=/tmp/mpvsocket
cache=yes
demuxer-max-bytes=150MiB
demuxer-max-back-bytes=100MiB
vd-queue-enable=yes
osd-playing-msg = '${filename}'

# --- MODERN HARDWARE PROFILE ---
[modern-hardware]
hwdec=auto-safe
vo=gpu-next
deband=yes
interpolation=yes
tscale=oversample
# glsl-shader="~~/shaders/ravu-zoom-r3.hook"

# --- LEGACY INTEL LAPTOP PROFILE ---
[legacy-intel-laptop]
vd-lavc-threads=4
vd-lavc-fast=yes
vd-lavc-skiploopfilter=nonref
dscale=bilinear
correct-downscaling=no
dither-depth=no
sigmoid-upscaling=no
sws-scaler=bilinear
sws-fast=yes
# Add this for the legacy laptop specifically:
# It forces the player to ignore high-bitrate video color data
# that the old Intel iGPU can't render anyway.
vf=format=yuv420p
