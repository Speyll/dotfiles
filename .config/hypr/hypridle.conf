general {
    # Spawns hyprlock cleanly
    lock_cmd = pidof hyprlock || hyprlock

    # Ensures loginctl handles locking the screen state prior to system sleep cycles
    before_sleep_cmd = loginctl lock-session

    # Crucial: DO NOT ignore inhibition requests from videos (D-Bus) and games (Wayland)
    ignore_dbus_inhibit = false
    ignore_wayland_inhibit = false
}

# 1. Dim ALL possible screens after 3 minutes (180s)
# This WILL be blocked if a video/game is active
listener {
    timeout = 180
    on-timeout = ddcutil --bus 5 setvcp 10 1 & ddcutil --bus 7 setvcp 10 1 & brightnessctl -s set 10%
    on-resume = ddcutil --bus 5 setvcp 10 50 & ddcutil --bus 7 setvcp 10 55 & brightnessctl -r
}

# 2. Lock the Session after 5 minutes (300s)
# This WILL be blocked if a video/game is active
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# 3. Turn off external monitors completely after 10 minutes (600s)
# This WILL be blocked if a video/game is active
listener {
    timeout = 600
    on-timeout = niri msg action power-off-monitors
    on-resume = niri msg action power-on-monitors
}

# 4. Deep Sleep / Suspend after 30 minutes (1800s)
# Optional: Keep your PC from suspending if you fall asleep watching a movie.
# If you want it to suspend NO MATTER WHAT after 30 mins, uncomment the line below:
#listener {
#    timeout = 1800
#    # ignore_inhibit = true
#    on-timeout = loginctl suspend
#}
