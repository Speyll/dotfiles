general {
    # Uses niri's native session lock command to spawn hyprlock cleanly
    lock_cmd = pidof hyprlock || niri msg action ext-session-lock

    # Ensures loginctl handles locking the screen state prior to system sleep cycles
    before_sleep_cmd = loginctl lock-session
}

# 1. Dim ALL possible screens after 3 minutes (180s)
listener {
    timeout = 180
    # Dims desktop screens via I2C, and simultaneously dims a laptop screen if present
    on-timeout = ddcutil --bus 5 setvcp 10 1 & ddcutil --bus 7 setvcp 10 1 & brightnessctl -s set 10%
    # Restores desktop screens and laptop screen back to full brightness
    on-resume = ddcutil --bus 5 setvcp 10 40 & ddcutil --bus 7 setvcp 10 55 & brightnessctl -r
}

# 2. Lock the Session after 5 minutes (300s)
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# 3. Turn off external monitors completely after 10 minutes (600s)
listener {
    timeout = 600
    # Cuts video output signal via Niri (monitors enter standby)
    on-timeout = niri msg action power-off-monitors
    # Wakes monitors up on mouse movement
    on-resume = niri msg action power-on-monitors
}

# 4. Deep Sleep / Suspend after 30 minutes (1800s)
listener {
    timeout = 1800
    on-timeout = loginctl suspend
}
