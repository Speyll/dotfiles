general {
    # Uses niri's native session lock command to spawn hyprlock cleanly
    lock_cmd = pidof hyprlock || niri msg action ext-session-lock

    # Ensures loginctl handles locking the screen state prior to system sleep cycles
    before_sleep_cmd = loginctl lock-session
}

# 1. Turn off external monitors completely after 5 minutes
listener {
    timeout = 300
    # Cuts video output signal (monitor goes into standby)
    on-timeout = niri msg action power-off-monitors
    # Instantly wakes the monitors up the exact millisecond you move the mouse
    on-resume = niri msg action power-on-monitors
}

# 2. Lock the Session after 10 minutes
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# 3. Deep Sleep / Suspend after 30 minutes
listener {
    timeout = 1800
    on-timeout = loginctl suspend
}
